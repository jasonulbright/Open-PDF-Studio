name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Node dependencies
        run: npm ci

      - name: Lint (ESLint — errors gate; advisory warnings are not CI noise)
        run: npm run lint -- --quiet

      - name: Build renderer (Vite)
        run: npm run build:renderer

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Create resource stubs for Tauri build script
        run: |
          mkdir -p resources/python
          mkdir -p resources/ghostscript
        shell: bash

      - name: Check Rust compilation
        run: cd src-tauri && cargo check

  test-engine:
    name: Python Engine Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        # Versions pinned to the shipped engine runtime (scripts/python-requirements.in)
        # so tests exercise what actually ships. pyHanko is required — the engine's
        # signatures handler imports it at module load, so test_engine.py fails to
        # collect without it (pyHanko pulls cryptography/certvalidator transitively).
        run: pip install pikepdf==10.9.1 pdfminer.six==20260107 pyHanko==0.35.2 pytest

      - name: Run engine + validation tests
        run: python -m pytest tests/test_engine.py tests/test_validation.py -v

  audit:
    name: Dependency Audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production)
        run: npm audit --production --audit-level=high

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo audit
        run: |
          cargo install cargo-audit
          cd src-tauri && cargo audit

  e2e:
    name: E2E (WebdriverIO + tauri-driver)
    runs-on: windows-latest
    # The job cap is a backstop, not the failure detector — the pre-flight
    # step below is what catches "no session can be created at all" (runner
    # image drift) in minutes instead of grinding 39 specs' worth of session
    # retries into this cap and reporting a useless grey "cancelled".
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Node dependencies (root)
        run: npm ci

      - name: Install Node dependencies (e2e)
        run: npm ci
        working-directory: e2e-tests

      - name: Provision embedded Python for engine sidecar
        run: powershell -ExecutionPolicy Bypass -File scripts/setup-python-embed.ps1
        shell: pwsh

      - name: Vendor Ghostscript (the visual-compare e2e drives the real GS raster)
        # 11-compare.spec.ts (visual mode) exercises engine compare_visual, which
        # shells out to bundled Ghostscript — so the suite DOES need real GS, not
        # a stub. bundle-ghostscript.ps1 downloads + checksum-verifies + extracts
        # with 7-Zip (preinstalled on windows runners).
        run: powershell -ExecutionPolicy Bypass -File scripts/bundle-ghostscript.ps1
        shell: pwsh

      - name: Build Tauri binary (debug, frontend embedded, no installer)
        run: npx tauri build --debug --no-bundle
        env:
          VITE_E2E: "1"

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install msedgedriver matching runner WebView2 Runtime
        # msedgedriver-tool resolves against the installed WebView2 RUNTIME
        # (registry pv of the EdgeUpdate WebView2 client), not Edge-the-browser
        # — the step's old name said "Edge" and misled a whole investigation.
        # wdio.conf.ts onPrepare re-runs the tool anyway (self-healing rule);
        # this step exists to have the tool compiled + on PATH.
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool
          $cargoBin = "$env:USERPROFILE\.cargo\bin"
          Push-Location $cargoBin
          msedgedriver-tool
          Pop-Location
          echo "$cargoBin" >> $env:GITHUB_PATH
        shell: pwsh

      # Ground-truth probe for the 20260714-image session failures (--disable-gpu
      # did NOT cure them; crash-event + profile-dir diagnostics came back EMPTY,
      # so the webview isn't even crashing — it's not starting, or not starting
      # where the driver looks). Two experiments, both informational-only:
      #   A. Launch the app BARE (no driver) with an explicit user-data folder
      #      and Chromium verbose logging → does WebView2 come up at all on this
      #      image? chrome_debug.log says what happens if not.
      #   B. Drive msedgedriver DIRECTLY (--verbose) with a raw session POST →
      #      the verbose log states WHY DevToolsActivePort never appears
      #      (browser exit code, path denials, arg rejections).
      # A-works/B-fails → the driver↔webview handshake; A-fails → the image.
      - name: WebView2 ground-truth probe (informational)
        if: always()
        continue-on-error: true
        timeout-minutes: 6
        shell: pwsh
        run: |
          $app = Resolve-Path "src-tauri\target\debug\openpdfstudio.exe"
          $udf = "$env:RUNNER_TEMP\wv2probe"
          New-Item -ItemType Directory -Force $udf | Out-Null
          Write-Host "=== probe A: bare app launch ==="
          $env:OPENPDFSTUDIO_E2E = "1"
          $env:WEBVIEW2_USER_DATA_FOLDER = $udf
          $env:WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS = "--enable-logging --v=1"
          $p = Start-Process -FilePath $app -PassThru
          Start-Sleep -Seconds 25
          Write-Host "app alive after 25s: $(-not $p.HasExited); exitCode: $($p.ExitCode)"
          taskkill /F /T /PID $p.Id 2>$null | Out-Null
          Start-Sleep -Seconds 3
          Write-Host "--- user-data folder contents ---"
          try { Get-ChildItem -Recurse -Depth 2 $udf -ErrorAction Stop | Select-Object -First 25 -ExpandProperty FullName } catch { Write-Host "EMPTY: webview never initialized a profile" }
          Write-Host "--- chrome_debug.log (first 60 lines of each) ---"
          Get-ChildItem -Recurse $udf -Filter chrome_debug.log -ErrorAction SilentlyContinue | ForEach-Object { Write-Host ">> $($_.FullName)"; Get-Content $_.FullName -TotalCount 60 }
          Remove-Item Env:\WEBVIEW2_USER_DATA_FOLDER
          Write-Host "=== probe B: raw msedgedriver session ==="
          $driver = "$env:USERPROFILE\.cargo\bin\msedgedriver.exe"
          $dlog = "$env:RUNNER_TEMP\msedgedriver-verbose.log"
          $dp = Start-Process -FilePath $driver -ArgumentList "--port=9515","--verbose","--log-path=$dlog" -PassThru
          Start-Sleep -Seconds 3
          $body = @{ capabilities = @{ alwaysMatch = @{ browserName = "webview2"; "ms:edgeOptions" = @{ binary = "$app"; webviewOptions = @{} } } } } | ConvertTo-Json -Depth 6
          try {
            $r = Invoke-RestMethod -Uri "http://127.0.0.1:9515/session" -Method Post -Body $body -ContentType "application/json" -TimeoutSec 90
            Write-Host "SESSION CREATED: $($r.value.sessionId)"
          } catch { Write-Host "SESSION FAILED: $($_.Exception.Message)" }
          taskkill /F /T /PID $dp.Id 2>$null | Out-Null
          taskkill /F /IM openpdfstudio.exe 2>$null | Out-Null
          Write-Host "--- msedgedriver verbose log (DevTools/launch lines) ---"
          try { Get-Content $dlog -ErrorAction Stop | Select-String -Pattern "DevTools|launch|binary|exit|error|denied|user-data" -CaseSensitive:$false | Select-Object -First 50 } catch { Write-Host "no driver log" }

      - name: Session pre-flight (fail fast on runner-image drift)
        timeout-minutes: 8
        run: npx wdio run wdio.conf.ts --spec specs/01-boot.spec.ts
        working-directory: e2e-tests
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: "--disable-gpu"

      - name: Run WebdriverIO suite
        timeout-minutes: 40
        run: npm test
        working-directory: e2e-tests
        env:
          WEBVIEW2_ADDITIONAL_BROWSER_ARGUMENTS: "--disable-gpu"

      - name: Dump WebView2 crash diagnostics
        if: failure()
        shell: pwsh
        run: |
          try {
            Get-WinEvent -FilterHashtable @{LogName='Application'; Id=1000,1001} -MaxEvents 40 -ErrorAction Stop |
              Where-Object { $_.Message -match 'msedgewebview2|openpdfstudio|msedgedriver' } |
              Format-List TimeCreated, Id, Message
          } catch { Write-Host "no matching crash events" }
          try {
            Get-ChildItem "$env:TEMP" -Filter "*EBWebView*" -Recurse -Depth 2 -ErrorAction Stop |
              Select-Object -First 20 -ExpandProperty FullName
          } catch { Write-Host "no EBWebView temp dirs" }
